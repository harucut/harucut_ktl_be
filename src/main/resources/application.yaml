spring:
  application:
    name: harucut
  profiles:
    active: local
  jpa:
    open-in-view: false
    generate-ddl: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 100
  sql:
    init:
      mode: always
      encoding: UTF-8
  mail:
    host: smtp.gmail.com
    port: 587
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
            issuer-uri: https://kauth.kakao.com
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

dotenv:
  ignoreIfMissing: true

billing:
  pricing:
    basic: 0
    plus: 3000
    pro: 10000

kakao:
  auth:
    admin-key: 1b8a8bad22172e48cd866bff7e616a58
    unlink-url: https://kapi.kakao.com/v1/user/unlink
    unlink-content-type: application/x-www-form-urlencoded;charset=utf-8
    unlink-target-id-type: user_id
