spring:
  application:
    name: harucut
  profiles:
    default: local

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Seoul

  # ── 메일: 기본값 = 로컬 MailHog, staging/prod 는 .env 로 Gmail SMTP 주입 ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

  # ── Redis: 기본값 = localhost, 컨테이너 환경은 .env 로 host/password 주입 ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── OAuth2 소셜 로그인 (구글·카카오 = OIDC, 네이버 = OAuth2) ──
  security:
    oauth2:
      client:
        registration:
          # 구글은 CommonOAuth2Provider 내장 → provider 엔드포인트 자동 설정. client-id/secret만 필요.
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - openid
              - email
              - profile
          kakao:
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - openid
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - name
              - email
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
            issuer-uri: https://kauth.kakao.com
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ${JWT_SECRET_KEY:local-dev-secret-key-must-be-at-least-256-bits-for-hs256-algorithm-x}
  access-expiration: 30m
  refresh-expiration: 14d

# ── 요금제 월 구독료(원) ──
billing:
  pricing:
    basic: 0
    plus: 3000
    pro: 10000

# ── 소셜 로그인 성공/실패 후 리다이렉트할 프론트엔드 ──
redirect-url:
  frontend: ${FRONTEND_URL:http://localhost:5173}

# ── 쿠키: 로컬 기본 localhost/non-secure/Lax, 운영은 .env 로 주입 ──
# 크로스 사이트(로컬 프론트 → 배포 api.harucut.com) 인증 시 same-site=None + secure=true 필요
cookie:
  domain: ${COOKIE_DOMAIN:localhost}
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}

# ── 카카오 연결 끊기(unlink): 회원 탈퇴 하드삭제 시 사용 (Phase 4) ──
kakao:
  auth:
    admin-key: ${KAKAO_ADMIN_KEY:}
    unlink-url: https://kapi.kakao.com/v1/user/unlink
    unlink-content-type: application/x-www-form-urlencoded;charset=utf-8
    unlink-target-id-type: user_id

# ── AWS ──
cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    credentials:
      access-key: ${AWS_ACCESS_KEY:dummy-access-key}
      secret-key: ${AWS_SECRET_KEY:dummy-secret-key}
    s3:
      bucket: ${S3_BUCKET:harucut-local}
    mediaconvert:
      endpoint: ${AWS_MEDIACONVERT_ENDPOINT:https://dummy.mediaconvert.ap-northeast-2.amazonaws.com}
      role-arn: ${AWS_MEDIACONVERT_ROLE_ARN:arn:aws:iam::000000000000:role/dummy}
      template-name: ${AWS_MEDIACONVERT_TEMPLATE:dummy-template}

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true

server:
  port: 8080
