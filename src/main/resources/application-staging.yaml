# ── Staging (MySQL/Redis 컨테이너, .env.staging 주입) ─────────
# 공통 설정(OAuth2/JWT/Mail/Redis/Cookie/AWS)은 application.yaml 참조.
# 리버스 프록시(nginx) 뒤에서 {baseUrl} 이 https 공개주소로 해석되도록 forward-headers 활성화.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    com.harucut: INFO
    root: INFO
